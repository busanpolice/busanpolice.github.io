<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busan Foreigner Safety Platform</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b1d3a;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }
        img {
            width: 100%;
            height: auto;
            display: block;
        }
        /* 이미지 위를 클릭하는 링크 영역 정의 */
        .touch-link {
            position: absolute;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0); /* 투명 */
            border-radius: 12px;
            display: block;
        }

        /* [언어 버튼 클릭 시 해당 html 주소로 이동하도록 설정] */
        .btn-en {
            top: 55.6%;
            left: 6.7%;
            width: 86.6%;
            height: 6.2%;
        }
        .btn-cn {
            top: 62.4%;
            left: 6.7%;
            width: 86.6%;
            height: 6.2%;
        }
        .btn-jp {
            top: 69.2%;
            left: 6.7%;
            width: 86.6%;
            height: 6.2%;
        }
        .btn-vn {
            top: 76.0%;
            left: 6.7%;
            width: 86.6%;
            height: 6.2%;
        }

        /* [긴급전화 연결 영역] */
        .phone-link {
            position: absolute;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0); 
            height: 10.5%;
            top: 81.5%;
        }
        .call-112 {
            left: 6.7%;
            width: 27.5%;
        }
        .call-119 {
            left: 36.2%;
            width: 27.5%;
        }
        .call-1330 {
            left: 65.8%;
            width: 27.5%;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="home.png" alt="Busan Foreigner Safety Platform">

        <a href="en.html" class="touch-link btn-en" title="English"></a>
        <a href="cn.html" class="touch-link btn-cn" title="中文"></a>
        <a href="jp.html" class="touch-link btn-jp" title="日本語"></a>
        <a href="vn.html" class="touch-link btn-vn" title="Tiếng Việt"></a>

        <a href="tel:112" class="phone-link call-112" title="Call 112"></a>
        <a href="tel:119" class="phone-link call-119" title="Call 119"></a>
        <a href="tel:1330" class="phone-link call-1330" title="Call 1330"></a>
    </div>

</body>
</html>
